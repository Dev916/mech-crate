# {{SERVICE_NAME}} - Nuxt Application (Production)
# Generated by MechCrate Nuxt Recipe
# Traefik routes to this service via devmesh-traefik network

services:
  {{SERVICE_NAME}}:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    container_name: {{SERVICE_NAME}}
    env_file:
      - ../.config/.env.secrets
      - ../.config/.env.shared
      - ../.config/.env.{{SERVICE_NAME}}
    environment:
      - NODE_ENV=production
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=3000
    networks:
      - default
      - devmesh-traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.{{SERVICE_NAME}}.rule=Host(`{{DOMAIN}}`)
      - traefik.http.routers.{{SERVICE_NAME}}.entrypoints=web
      - traefik.http.services.{{SERVICE_NAME}}.loadbalancer.server.port=3000
      - traefik.docker.network=devmesh-traefik
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  devmesh-traefik:
    external: true
