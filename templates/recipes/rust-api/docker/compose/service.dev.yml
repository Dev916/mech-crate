# {{SERVICE_NAME}} - Rust API (Development)
# Overrides for local development
# Traefik routes to this service via devmesh-traefik network (no direct port exposure needed)

services:
  {{SERVICE_NAME}}:
    build:
      target: development
    environment:
      - RUST_ENV=development
      - RUST_LOG=debug,{{SERVICE_SLUG}}=trace
      - RUST_BACKTRACE=1
    volumes:
      # Mount source for development (cargo-watch will handle rebuilds)
      - ../../apps/{{SERVICE_NAME}}:/app:cached
      # Cache cargo dependencies
      - {{SERVICE_NAME}}_cargo_registry:/usr/local/cargo/registry
      - {{SERVICE_NAME}}_cargo_target:/app/target
    restart: "no"
    healthcheck:
      disable: true

  db:
    ports:
      - "5432:5432"

volumes:
  {{SERVICE_NAME}}_cargo_registry:
  {{SERVICE_NAME}}_cargo_target:
