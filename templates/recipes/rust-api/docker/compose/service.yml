# {{SERVICE_NAME}} - Rust API (Production)
# Generated by MechCrate Rust API Recipe

services:
  {{SERVICE_NAME}}:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    container_name: {{SERVICE_NAME}}
    env_file:
      - ../config/.env.shared
      - ../config/.env.secrets
      - ../config/.env.{{SERVICE_NAME}}
    environment:
      - RUST_ENV=production
      - RUST_LOG=info,{{SERVICE_SLUG}}=debug
    networks:
      - traefik
      - {{SERVICE_NAME}}-internal
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{SERVICE_NAME}}.rule=Host(`{{DOMAIN}}`)"
      - "traefik.http.routers.{{SERVICE_NAME}}.entrypoints=web"
      - "traefik.http.services.{{SERVICE_NAME}}.loadbalancer.server.port=3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  traefik:
    external: true
  {{SERVICE_NAME}}-internal:
    driver: bridge
