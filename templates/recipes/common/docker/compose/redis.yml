# Redis service - Baseline (Production)
# Shared Redis instance for MechCrate stacks

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    env_file:
      - ../.config/.env.shared
      - ../.config/.env.secrets
      - ../.config/.env.redis
    command: ["redis-server", "--maxmemory", "${REDIS_MAXMEMORY:-256mb}", "--maxmemory-policy", "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}", "--appendonly", "${REDIS_APPENDONLY:-yes}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
