# {{SERVICE_NAME}} - Rust Leptos SSR Stack (Development Overrides)
# Generated by MechCrate Rust-Leptos Recipe
# Traefik routes to this service via devmesh-traefik network (no direct port exposure needed)

services:
  {{SERVICE_NAME}}:
    build:
      target: development
    volumes:
      - ../../apps/{{SERVICE_NAME}}:/app
      - {{SERVICE_NAME}}_cargo_cache:/usr/local/cargo/registry
      - {{SERVICE_NAME}}_target_cache:/app/target
    environment:
      - RUST_LOG=debug,{{SERVICE_SLUG}}=debug
      - DATABASE_URL=postgres://{{SERVICE_SLUG}}:secret@db:5432/{{SERVICE_SLUG}}
      - REDIS_URL=redis://redis:6379
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
      - LEPTOS_RELOAD_PORT=3001
    ports:
      - "3001:3001"  # Hot reload port
    healthcheck:
      disable: true

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

volumes:
  {{SERVICE_NAME}}_cargo_cache:
  {{SERVICE_NAME}}_target_cache:
