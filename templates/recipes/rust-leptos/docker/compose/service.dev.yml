# {{SERVICE_NAME}} - Rust Leptos SSR Stack (Development Overrides)
# Generated by MechCrate Rust-Leptos Recipe

services:
  {{SERVICE_NAME}}:
    build:
      target: development
    volumes:
      - ../../apps/{{SERVICE_NAME}}:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    environment:
      - RUST_LOG=debug,{{SERVICE_SLUG}}=debug
      - DATABASE_URL=postgres://{{SERVICE_SLUG}}:secret@db:5432/{{SERVICE_SLUG}}
      - REDIS_URL=redis://redis:6379
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
      - LEPTOS_RELOAD_PORT=3001
    ports:
      - "${{{SERVICE_UPPER}}_PORT:-3000}:3000"
      - "3001:3001"  # Hot reload port
    healthcheck:
      disable: true
    labels:
      - "traefik.http.routers.{{SERVICE_NAME}}.rule=Host(`{{DOMAIN}}`)"
      - "traefik.http.routers.{{SERVICE_NAME}}.entrypoints=web"
      - "traefik.http.services.{{SERVICE_NAME}}.loadbalancer.server.port=3000"

volumes:
  cargo-cache:
  target-cache:
