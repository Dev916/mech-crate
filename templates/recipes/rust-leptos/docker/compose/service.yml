# {{SERVICE_NAME}} - Rust Leptos SSR Stack (Production)
# Generated by MechCrate Rust-Leptos Recipe

services:
  {{SERVICE_NAME}}:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    restart: unless-stopped
    environment:
      - RUST_LOG=info,{{SERVICE_SLUG}}=info
      - DATABASE_URL=postgres://{{SERVICE_SLUG}}:${DB_PASSWORD:-secret}@db:5432/{{SERVICE_SLUG}}
      - REDIS_URL=redis://redis:6379
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
      - LEPTOS_SITE_ROOT=site
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{SERVICE_NAME}}.rule=Host(`{{DOMAIN}}`)"
      - "traefik.http.routers.{{SERVICE_NAME}}.entrypoints=websecure"
      - "traefik.http.routers.{{SERVICE_NAME}}.tls=true"
      - "traefik.http.routers.{{SERVICE_NAME}}.tls.certresolver=letsencrypt"
      - "traefik.http.services.{{SERVICE_NAME}}.loadbalancer.server.port=3000"
      # Health check for Traefik
      - "traefik.http.services.{{SERVICE_NAME}}.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.{{SERVICE_NAME}}.loadbalancer.healthcheck.interval=30s"

networks:
  web:
    external: true
  internal:
    external: true
