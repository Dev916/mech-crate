# {{SERVICE_NAME}} - Rust Leptos SSR Stack (Production)
# Generated by MechCrate Rust-Leptos Recipe
# Traefik routes to this service via devmesh-traefik network

include:
  - path: redis.yml
  - path: db.yml

services:
  {{SERVICE_NAME}}:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    container_name: {{SERVICE_NAME}}
    restart: unless-stopped
    env_file:
      - ../.config/.env.secrets
      - ../.config/.env.shared
      - ../.config/.env.{{SERVICE_NAME}}
    environment:
      - RUST_LOG=info,{{SERVICE_SLUG}}=info
      - DATABASE_URL=postgres://{{SERVICE_SLUG}}:${DB_PASSWORD}@db:5432/{{SERVICE_SLUG}}
      - REDIS_URL=redis://redis:6379
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
      - LEPTOS_SITE_ROOT=site
    networks:
      - default
      - devmesh-traefik
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.{{SERVICE_NAME}}.rule=Host(`{{DOMAIN}}`)
      - traefik.http.routers.{{SERVICE_NAME}}.entrypoints=web
      - traefik.http.services.{{SERVICE_NAME}}.loadbalancer.server.port=3000
      - traefik.docker.network=devmesh-traefik

networks:
  devmesh-traefik:
    external: true
