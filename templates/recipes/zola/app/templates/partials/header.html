{# Site header with navigation #}
<header class="site-header">
    <div class="container">
        <a href="{{ config.base_url | safe }}" class="site-logo">
            {{ config.title }}
        </a>
        
        <nav class="site-nav" aria-label="Main navigation">
            <ul>
                <li><a href="{{ config.base_url | safe }}" {% if current_path == "/" %}aria-current="page"{% endif %}>Home</a></li>
                <li><a href="{{ get_url(path="@/blog/_index.md") }}" {% if current_path is starting_with("/blog") %}aria-current="page"{% endif %}>Blog</a></li>
                <li><a href="{{ get_url(path="@/about.md") }}" {% if current_path == "/about/" %}aria-current="page"{% endif %}>About</a></li>
            </ul>
        </nav>
        
        {# Mobile menu toggle #}
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        {# Theme toggle #}
        {% if config.extra.dark_mode %}
        <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
            <svg class="icon-sun" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
        {% endif %}
    </div>
</header>
