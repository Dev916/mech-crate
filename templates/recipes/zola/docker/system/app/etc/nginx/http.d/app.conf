# ─────────────────────────────────────────────────────────────────────────────
# {{SERVICE_NAME}} - Nginx Configuration for Static Site
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Charset
    charset utf-8;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Health check endpoint
    location = /up {
        access_log off;
        default_type text/plain;
        return 200 'OK';
    }
    
    # Static assets with long cache
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # Handle missing files
        try_files $uri =404;
    }
    
    # RSS/Atom feeds
    location ~* \.(xml|atom|rss)$ {
        add_header Content-Type "application/xml; charset=utf-8";
        expires 1h;
        try_files $uri =404;
    }
    
    # Search index (JSON)
    location ~* search_index.*\.json$ {
        add_header Content-Type "application/json; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
    
    # Main location - serve files or fall back to index.html
    location / {
        # Try exact file, then directory with index.html, then 404
        try_files $uri $uri/ $uri/index.html =404;
    }
    
    # Pretty URLs - serve clean URLs without .html extension
    location ~ ^/([^.]+)$ {
        try_files $uri $uri.html $uri/index.html =404;
    }
    
    # Custom error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to sensitive files
    location ~* (config\.toml|\.md)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
