# {{SERVICE_NAME}} - Laravel Octane + Swoole Stack (Development Overrides)
# Generated by MechCrate Laravel Recipe
# Traefik routes to this service via devmesh-traefik network (no direct port exposure needed)

services:
  {{SERVICE_NAME}}:
    build:
      target: development
    volumes:
      - ../../apps/{{SERVICE_NAME}}:/app
      - /app/vendor
      - /app/node_modules
    environment:
      - APP_MODE=app
      - APP_ENV=local
      - APP_DEBUG=true
      - OCTANE_SERVER=swoole
    ports:
      - "5173:5173"   # Vite HMR
      - "13714:13714" # Laravel Herd

