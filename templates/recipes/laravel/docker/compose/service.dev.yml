# {{SERVICE_NAME}} - Laravel Octane + Swoole Stack (Development Overrides)
# Generated by MechCrate Laravel Recipe

services:
  {{SERVICE_NAME}}:
    build:
      target: development
    volumes:
      - ../../apps/{{SERVICE_NAME}}:/app
      - /app/vendor
      - /app/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - OCTANE_SERVER=swoole
      - INERTIA_SSR_ENABLED=false
    ports:
      - "${{{SERVICE_UPPER}}_PORT:-8000}:8000"
      - "5173:5173"
      - "13714:13714"
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  {{SERVICE_NAME}}-worker:
    build:
      target: development
    volumes:
      - ../../apps/{{SERVICE_NAME}}:/app
      - /app/vendor

  {{SERVICE_NAME}}-scheduler:
    build:
      target: development
    volumes:
      - ../../apps/{{SERVICE_NAME}}:/app
      - /app/vendor
