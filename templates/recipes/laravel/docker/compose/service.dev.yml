# {{SERVICE_NAME}} - Laravel Octane + Swoole Stack (Development Overrides)
# Generated by MechCrate Laravel Recipe

services:
  {{SERVICE_NAME}}:
    build:
      target: development
    volumes:
      - ../../apps/{{SERVICE_NAME}}:/app
      - /app/vendor
      - /app/node_modules
    environment:
      - APP_MODE=app
      - APP_ENV=local
      - APP_DEBUG=true
      - OCTANE_SERVER=swoole
      - INERTIA_SSR_ENABLED=false
    ports:
      - "${{{SERVICE_UPPER}}_PORT:-80}:80"
      - "5173:5173"
      - "13714:13714"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  {{SERVICE_NAME}}-worker:
    build:
      target: development
    volumes:
      - ../../apps/{{SERVICE_NAME}}:/app
      - /app/vendor
    environment:
      - APP_MODE=queue
      - APP_ENV=local
      - QUEUE_WORKERS=1
      - RUN_SCHEDULER=true

  {{SERVICE_NAME}}-scheduler:
    profiles:
      - scheduler
    build:
      target: development
    volumes:
      - ../../apps/{{SERVICE_NAME}}:/app
      - /app/vendor
    environment:
      - APP_MODE=scheduler
      - APP_ENV=local