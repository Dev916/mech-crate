include:
  - ./{{SERVICE_NAME}}.yml

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Laravel Horizon Queue Manager
  # ─────────────────────────────────────────────────────────────────────────────
  {{SERVICE_NAME}}-worker:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    container_name: {{SERVICE_NAME}}-worker
    env_file:
      - ../.config/.env.secrets
      - ../.config/.env.shared
      - ../.config/.env.{{SERVICE_NAME}}
    environment:
      - APP_MODE=horizon
      - APP_ENV=production
      - RUN_SCHEDULER=false
    volumes:
      - ../../apps/{{SERVICE_NAME}}/storage:/app/storage
    depends_on:
      {{SERVICE_NAME}}:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s