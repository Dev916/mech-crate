# {{SERVICE_NAME}} - Laravel Octane + Swoole Stack (Production)
# Generated by MechCrate Laravel Recipe

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Laravel Octane Application (Swoole + Nginx + Supervisor)
  # ─────────────────────────────────────────────────────────────────────────────
  {{SERVICE_NAME}}:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    container_name: {{SERVICE_NAME}}
    env_file:
      - ../config/.env.{{SERVICE_NAME}}
    environment:
      - APP_MODE=app
      - APP_ENV=production
      - OCTANE_WORKERS=auto
      - OCTANE_TASK_WORKERS=auto
      - INERTIA_SSR_ENABLED=true
    volumes:
      - ../../apps/{{SERVICE_NAME}}/storage:/app/storage
    networks:
      - {{SERVICE_NAME}}-internal
      - traefik
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{SERVICE_NAME}}.rule=Host(`{{DOMAIN}}`)"
      - "traefik.http.routers.{{SERVICE_NAME}}.entrypoints=web"
      - "traefik.http.services.{{SERVICE_NAME}}.loadbalancer.server.port=80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/up"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────────
  # Laravel Horizon Queue Manager
  # ─────────────────────────────────────────────────────────────────────────────
  {{SERVICE_NAME}}-worker:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    container_name: {{SERVICE_NAME}}-worker
    env_file:
      - ../config/.env.{{SERVICE_NAME}}
    environment:
      - APP_MODE=horizon
      - APP_ENV=production
      - RUN_SCHEDULER=false
    volumes:
      - ../../apps/{{SERVICE_NAME}}/storage:/app/storage
    networks:
      - {{SERVICE_NAME}}-internal
    depends_on:
      {{SERVICE_NAME}}:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────────
  # Task Scheduler
  # ─────────────────────────────────────────────────────────────────────────────
  {{SERVICE_NAME}}-scheduler:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    container_name: {{SERVICE_NAME}}-scheduler
    env_file:
      - ../config/.env.{{SERVICE_NAME}}
    environment:
      - APP_MODE=scheduler
      - APP_ENV=production
    volumes:
      - ../../apps/{{SERVICE_NAME}}/storage:/app/storage
    networks:
      - {{SERVICE_NAME}}-internal
    depends_on:
      {{SERVICE_NAME}}:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "scheduler-runner"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  {{SERVICE_NAME}}-internal:
    driver: bridge
  traefik:
    external: true
