# {{SERVICE_NAME}} - Laravel Octane + Swoole Stack (Production)
# Generated by MechCrate Laravel Recipe

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Laravel Octane Application (Swoole)
  # ─────────────────────────────────────────────────────────────────────────────
  {{SERVICE_NAME}}:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    container_name: {{SERVICE_NAME}}
    env_file:
      - ../config/.env.{{SERVICE_NAME}}
    volumes:
      - ../../apps/{{SERVICE_NAME}}/storage:/app/storage
    networks:
      - {{SERVICE_NAME}}-internal
      - traefik
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{SERVICE_NAME}}.rule=Host(`{{DOMAIN}}`)"
      - "traefik.http.routers.{{SERVICE_NAME}}.entrypoints=web"
      - "traefik.http.services.{{SERVICE_NAME}}.loadbalancer.server.port=8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/up"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────────────────
  # Queue Worker (Swoole Task Workers)
  # ─────────────────────────────────────────────────────────────────────────────
  {{SERVICE_NAME}}-worker:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    container_name: {{SERVICE_NAME}}-worker
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    env_file:
      - ../config/.env.{{SERVICE_NAME}}
    volumes:
      - ../../apps/{{SERVICE_NAME}}/storage:/app/storage
    networks:
      - {{SERVICE_NAME}}-internal
    depends_on:
      {{SERVICE_NAME}}:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # Scheduler (Cron)
  # ─────────────────────────────────────────────────────────────────────────────
  {{SERVICE_NAME}}-scheduler:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    container_name: {{SERVICE_NAME}}-scheduler
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"]
    env_file:
      - ../config/.env.{{SERVICE_NAME}}
    volumes:
      - ../../apps/{{SERVICE_NAME}}/storage:/app/storage
    networks:
      - {{SERVICE_NAME}}-internal
    depends_on:
      {{SERVICE_NAME}}:
        condition: service_healthy
    restart: unless-stopped

networks:
  {{SERVICE_NAME}}-internal:
    driver: bridge
  traefik:
    external: true
