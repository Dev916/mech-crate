[package]
name = "{{SERVICE_SLUG}}"
version = "0.1.0"
edition = "2021"
description = "{{SERVICE_NAME}} - High-performance job worker"

[[bin]]
name = "{{SERVICE_SLUG}}"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full", "tracing"] }
tokio-stream = { version = "0.1", features = ["sync"] }
futures = "0.3"
async-trait = "0.1"

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid", "chrono", "json"] }

# Redis
redis = { version = "0.27", features = ["tokio-comp", "connection-manager", "streams"] }
deadpool-redis = "0.18"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Types
uuid = { version = "1", features = ["v4", "v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging & Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Metrics
metrics = "0.24"
metrics-exporter-prometheus = "0.16"

# Utils
dotenvy = "0.15"
config = "0.14"
parking_lot = "0.12"
dashmap = "6"
crossbeam-channel = "0.5"
rayon = "1.10"
num_cpus = "1.16"

# Backpressure & Streaming
async-channel = "2"
tokio-util = { version = "0.7", features = ["codec"] }

# Graceful shutdown
tokio-graceful-shutdown = "0.15"

# LLM (optional)
llama-cpp-2 = { version = "0.1", optional = true }

# HTTP client (for webhooks)
reqwest = { version = "0.12", features = ["json"] }

# Random number generation
rand = "0.8"

[features]
default = []
llm = ["llama-cpp-2"]

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true

[profile.release-with-debug]
inherits = "release"
debug = true
strip = false
