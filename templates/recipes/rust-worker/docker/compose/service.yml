# {{SERVICE_NAME}} - Rust Job Worker (Production)
# Generated by MechCrate Rust-Worker Recipe

services:
  {{SERVICE_NAME}}:
    build:
      context: ../..
      dockerfile: docker/dockerfiles/{{SERVICE_NAME}}/app
      target: production
    restart: unless-stopped
    command: ["worker", "--workers={{WORKERS}}", "--batch-size={{BATCH_SIZE}}"]
    environment:
      - RUST_LOG=info,{{SERVICE_SLUG}}=info
      - DATABASE_URL=postgres://{{SERVICE_SLUG}}:${DB_PASSWORD:-secret}@db:5432/{{SERVICE_SLUG}}
      - REDIS_URL=redis://redis:6379
      - WORKER_THREADS={{WORKERS}}
      - BATCH_SIZE={{BATCH_SIZE}}
      - METRICS_ENABLED=true
      - METRICS_PORT=9090
      - CHANNEL=jobs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=9090"
      - "prometheus.path=/metrics"

networks:
  internal:
    external: true
