# {{SERVICE_NAME}} - Rust Job Worker (Development Overrides)
# Generated by MechCrate Rust-Worker Recipe

services:
  {{SERVICE_NAME}}:
    build:
      target: development
    volumes:
      - ../../apps/{{SERVICE_NAME}}:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    environment:
      - RUST_LOG=debug,{{SERVICE_SLUG}}=debug
      - DATABASE_URL=postgres://{{SERVICE_SLUG}}:secret@db:5432/{{SERVICE_SLUG}}
      - REDIS_URL=redis://redis:6379
      - WORKER_THREADS=2
      - BATCH_SIZE=10
      - METRICS_ENABLED=true
      - METRICS_PORT=9090
    ports:
      - "9090:9090"  # Metrics
    deploy:
      replicas: 1
    healthcheck:
      disable: true

volumes:
  cargo-cache:
  target-cache:
