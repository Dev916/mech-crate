# ========================================
# {{SERVICE_NAME}} - Production Docker Compose
# ========================================
# Traefik routes to this service via devmesh-traefik network

include:
  - path: ../../docker/compose/db.yml
    optional: true
  - path: ../../docker/compose/redis.yml
    optional: true

services:
  # ------------------------------------------
  # Astro SSR Application
  # ------------------------------------------
  {{SERVICE_NAME}}:
    build:
      context: ../../apps/{{SERVICE_NAME}}
      dockerfile: ../../docker/dockerfiles/{{SERVICE_NAME}}/app
      target: runner
    container_name: {{SERVICE_SLUG}}
    restart: unless-stopped
    env_file:
      - ../.config/.env.secrets
      - ../.config/.env.shared
      - ../.config/.env.{{SERVICE_NAME}}
    environment:
      - NODE_ENV=production
      - PORT=4321
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379
      - APP_URL=https://{{DOMAIN}}
    networks:
      - default
      - devmesh-traefik
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.{{SERVICE_SLUG}}.rule=Host(`{{DOMAIN}}`)
      - traefik.http.routers.{{SERVICE_SLUG}}.entrypoints=web
      - traefik.http.services.{{SERVICE_SLUG}}.loadbalancer.server.port=4321
      - traefik.docker.network=devmesh-traefik

networks:
  devmesh-traefik:
    external: true
