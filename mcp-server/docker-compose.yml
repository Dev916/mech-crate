# MechCrate MCP Server - Weaviate RAG Stack
#
# This provides the vector database for semantic documentation search.
# Dynamic port allocation is handled by environment variables.
#
# Environment variables:
#   MX_MCP_WEAVIATE_PORT - HTTP port (default: 8080)
#   MX_MCP_GRPC_PORT     - gRPC port (default: 50051)

services:
  weaviate:
    image: semitechnologies/weaviate:1.28.4
    container_name: mx-mcp-weaviate
    ports:
      - "${MX_MCP_WEAVIATE_PORT:-8080}:8080"
      - "${MX_MCP_GRPC_PORT:-50051}:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "text2vec-transformers"
      ENABLE_MODULES: "text2vec-transformers"
      TRANSFORMERS_INFERENCE_API: "http://t2v-transformers:8080"
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped
    depends_on:
      - t2v-transformers
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  t2v-transformers:
    image: semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2
    container_name: mx-mcp-transformers
    environment:
      ENABLE_CUDA: "0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  weaviate_data:
    name: mx-mcp-weaviate-data
