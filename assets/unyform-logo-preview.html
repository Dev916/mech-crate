<!DOCTYPE html>
<html>
<head>
  <title>Unyform Logo Variations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, sans-serif;
      background: #18181b;
      color: #f4f4f5;
      padding: 40px;
    }
    h1 { text-align: center; margin-bottom: 40px; font-weight: 300; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      background: #27272a;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }
    .card img {
      width: 100%;
      max-width: 200px;
      height: auto;
    }
    .card h3 {
      margin-top: 16px;
      font-weight: 400;
      font-size: 14px;
      color: #a1a1aa;
    }
    .light {
      background: #f4f4f5;
    }
  </style>
</head>
<body>
  <h1>Unyform Logo — Pocket Detail Variations</h1>
  
  <div class="grid">
    <div class="card">
      <img src="unyform-logo-v1-chevron.svg" alt="Chevron">
      <h3>1. Small Chevron + Button</h3>
    </div>
    <div class="card">
      <img src="unyform-logo-v2-welt.svg" alt="Welt">
      <h3>2. Welt Pocket Line + Button</h3>
    </div>
    <div class="card">
      <img src="unyform-logo-v3-flap.svg" alt="Flap">
      <h3>3. Rectangular Flap + Button</h3>
    </div>
    <div class="card">
      <img src="unyform-logo-v4-minimal.svg" alt="Minimal">
      <h3>4. Four-Hole Button Only</h3>
    </div>
    <div class="card">
      <img src="unyform-logo-v5-snap.svg" alt="Snap">
      <h3>5. Snap Button (Concentric)</h3>
    </div>
    <div class="card">
      <img src="unyform-logo-v6-stitch.svg" alt="Stitch">
      <h3>6. Inner Stitch + Button</h3>
    </div>
  </div>
  
  <h1 style="margin-top: 60px;">On Light Background</h1>
  
  <div class="grid">
    <div class="card light">
      <img src="unyform-logo-v1-chevron.svg" alt="Chevron">
      <h3 style="color:#52525b">1. Small Chevron</h3>
    </div>
    <div class="card light">
      <img src="unyform-logo-v2-welt.svg" alt="Welt">
      <h3 style="color:#52525b">2. Welt Pocket</h3>
    </div>
    <div class="card light">
      <img src="unyform-logo-v5-snap.svg" alt="Snap">
      <h3 style="color:#52525b">5. Snap Button</h3>
    </div>
  </div>
</body>
</html>
