<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!--
    UNYFORM ICON - Compact version with V-flap + button
  -->
  
  <g transform="translate(16, 12)">
    
    <!-- TOP BAR - RIGHT HALF (navy) -->
    <line x1="48" y1="0" x2="96" y2="0" stroke="#1e1b4b" stroke-width="8" stroke-linecap="round"/>
    
    <!-- TOP BAR - LEFT HALF (accent) -->
    <line x1="0" y1="0" x2="48" y2="0" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
    
    <!-- RIGHT + BOTTOM CURVE (navy) -->
    <path 
      d="M 96 0 L 96 64 Q 96 104 48 104 Q 0 104 0 64"
      fill="none"
      stroke="#1e1b4b"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    
    <!-- LEFT VERTICAL (accent) -->
    <line x1="0" y1="0" x2="0" y2="64" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
    
    <!-- HORIZONTAL CROSSBAR (accent) -->
    <line x1="0" y1="32" x2="32" y2="32" stroke="#6366f1" stroke-width="6" stroke-linecap="round"/>
    
    <!-- V-FLAP (simplified) -->
    <path d="M 20 12 L 48 28 L 76 12" fill="none" stroke="#1e1b4b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- BUTTON -->
    <circle cx="48" cy="28" r="3.5" fill="none" stroke="#1e1b4b" stroke-width="2"/>
    
  </g>
  
</svg>