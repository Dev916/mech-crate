# Tell Nginx to pass the script filename to PHP-FPM
fastcgi_split_path_info ^(.+\.php)(/.+)$;

include fastcgi_params;

# Set the SCRIPT_FILENAME parameter which PHP-FPM requires
fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

# Pass the original request URI to the FastCGI server
fastcgi_param QUERY_STRING    $query_string;
fastcgi_param REQUEST_METHOD  $request_method;
fastcgi_param CONTENT_TYPE    $content_type;
fastcgi_param CONTENT_LENGTH  $content_length;

# These parameters allow PHP-FPM to understand the correct URI and path information
fastcgi_param SCRIPT_NAME     $fastcgi_script_name;
fastcgi_param PATH_INFO       $fastcgi_path_info;
fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;

# Set the HTTP_HOST and SERVER variables
fastcgi_param SERVER_NAME     $server_name;
fastcgi_param SERVER_PORT     $server_port;
fastcgi_param SERVER_ADDR     $server_addr;
fastcgi_param SERVER_PROTOCOL $server_protocol;
fastcgi_param REMOTE_ADDR     $remote_addr;
fastcgi_param REMOTE_PORT     $remote_port;

# Pass the HTTPS variable, useful for applications that need to know if the request was over SSL
fastcgi_param HTTPS           $https if_not_empty;

# Enable response buffering for better performance
fastcgi_buffer_size 128k;
fastcgi_buffers 256 16k;
fastcgi_busy_buffers_size 256k;
fastcgi_temp_file_write_size 256k;

# Prevent Nginx from buffering responses larger than a certain size
fastcgi_max_temp_file_size 0;

# Allow FastCGI to manage response headers and end request handling
fastcgi_intercept_errors on;

# Allow FastCGI to read request body in chunks
fastcgi_read_timeout 300;
fastcgi_send_timeout 300;