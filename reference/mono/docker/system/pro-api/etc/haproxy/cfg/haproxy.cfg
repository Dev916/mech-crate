global
    log stdout  format raw  local0  info
    chroot  /var/lib/haproxy
    pidfile /var/run/haproxy.pid
    maxconn 4000
    user    haproxy
    group   haproxy
    daemon
    no strict-limits

defaults
    mode                     http
    log                      global
    option                   httplog
    option                   dontlognull
    option                   http-server-close
    option                   forwardfor except 127.0.0.0/8
    option                   redispatch
    retries                  3
    timeout http-request     10s
    timeout queue            1m
    timeout connect          10s
    timeout client           60s
    timeout server           60s
    timeout http-keep-alive  10s
    timeout check            10s
    maxconn                  3000


http-errors errors
    errorfile 404 /etc/haproxy/errors/404.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 503 /etc/haproxy/errors/503.http

frontend main
    bind *:80

    # set protocol
    http-request set-var(txn.proto) req.hdr(X-Forwarded-Proto)

    # send version
    http-after-response set-header X-Powered-By "${IMAGE_VERSION}"
    
    # Health checks bypass backend
    use_backend health if { path /health }
    use_backend health if { path /ready }

    # Route docs frontend paths to docs server
    acl is_docs_path path_beg /docs
    acl is_docs_path path_beg /pricing
    acl is_docs_path path_beg /dashboard
    acl is_docs_path path_beg /contact
    acl is_docs_path path_beg /login
    acl is_docs_path path_beg /signup
    acl is_docs_path path_beg /checkout
    acl is_docs_path path_beg /about
    acl is_docs_path path /
    acl is_docs_path path_beg /style
    acl is_docs_path path_beg /assets
    acl is_docs_path path_beg /pkg
    
    # API paths go to API backend
    acl is_api_path path_beg /api
    acl is_api_path path_beg /webhooks

    use_backend docs if is_docs_path !is_api_path
    default_backend app

backend health
    server app 127.0.0.1:8080
    mode http
    option forwardfor

backend app
    server app 127.0.0.1:8080
    mode http
    option forwardfor
    option http-server-close
    option http-keep-alive

    http-response set-header Cache-Control %[var(txn.cache_control)] unless { res.hdr(Cache-Control) -m found }

backend docs
    server docs 127.0.0.1:3081
    mode http
    option forwardfor
    option http-server-close
