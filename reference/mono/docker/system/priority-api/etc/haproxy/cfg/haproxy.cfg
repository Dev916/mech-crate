global
    log stdout  format raw  local0  info
    chroot  /var/lib/haproxy
    pidfile /var/run/haproxy.pid
    maxconn 4000
    user    haproxy
    group   haproxy
    daemon
    no strict-limits

defaults
    mode                     http
    log                      global
    option                   httplog
    option                   dontlognull
    option                   http-server-close
    option                   forwardfor except 127.0.0.0/8
    option                   redispatch
    retries                  3
    timeout http-request     10s
    timeout queue            1m
    timeout connect          10s
    timeout client           86400s
    timeout server           86400s
    timeout tunnel           86400s
    timeout http-keep-alive  10s
    timeout check            10s
    maxconn                  3000


http-errors errors
    errorfile 404 /etc/haproxy/errors/404.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 503 /etc/haproxy/errors/503.http

frontend main
    bind *:80

    # ACLs for WebSocket detection
    acl is_websocket hdr(Upgrade) -i websocket
    acl is_upgrade hdr(Connection) -i upgrade

    # set protocol
    http-request set-var(txn.proto) req.hdr(X-Forwarded-Proto)

    # send version
    http-after-response set-header X-Powered-By "${IMAGE_VERSION}"
    
    use_backend docs if { url_beg -i '/docs' }
    use_backend docs if { url_beg -i '/pkg' }
    use_backend docs if { url_beg -i '/assets' }
    use_backend docs if { url_beg -i '/favicon.ico' }
    
    use_backend app if is_websocket is_upgrade

    default_backend app

backend docs
    server docs 127.0.0.1:3000
    mode http
    option forwardfor
    option http-server-close
    option http-keep-alive
    http-response set-header Cache-Control %[var(txn.cache_control)] unless { res.hdr(Cache-Control) -m found }


backend app
    server app 127.0.0.1:8080
    mode http
    option forwardfor
    option http-server-close
    option http-keep-alive

    http-response set-header Cache-Control %[var(txn.cache_control)] unless { res.hdr(Cache-Control) -m found }

