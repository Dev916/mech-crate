include:
  - ./postgres.yml
  - ./sqs.yml

services:
  campus-sqs-queue:
    container_name: campus-sqs-queue
    depends_on:
      - postgres
      - sqs
    image: ghcr.io/theblockcrypto/campus-lms:${CAMPUS_LMS_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ../.config/.env.secrets
      - ../.config/.env.shared
      - ../.config/.env.campus-lms
      - ../.config/.env.campus-queue-sqs
    environment:
      - QUEUE_CONNECTION=sqs