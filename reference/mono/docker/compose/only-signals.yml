include:
  - ./postgres.yml
  - ./traefik.yml

services:
  only-signals:
    container_name: only-signals
    depends_on:
      - postgres
      - traefik
    env_file:
      - ../.config/.env.secrets
      - ../.config/.env.shared
      - ../.config/.env.only-signals
    image: "ghcr.io/theblockcrypto/only-signals:${ONLY_SIGNALS_IMAGE_TAG:-latest}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.only-signals.rule=Host(`only-signals.localhost`)"
      - "traefik.http.routers.only-signals.entrypoints=http"
      - "traefik.http.services.only-signals.loadbalancer.server.port=80"
    restart: unless-stopped
